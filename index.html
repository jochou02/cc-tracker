<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Perks Tracker</title>

    <!-- Tailwind (optional for now, but matches your plan) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-4 sm:py-6 space-y-4 sm:space-y-6">
      <!-- Unified header bar -->
      <header id="app-header" class="bg-white border border-gray-200 rounded-xl px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-wrap gap-3">
        <h1 class="text-xl font-bold tracking-tight">Credit Card Perks Tracker</h1>
        <div class="flex items-center gap-5">
          <div id="toolbar-user"></div>
          <div class="w-px h-6 bg-gray-200"></div>
          <div id="toolbar-year"></div>
        </div>
      </header>

      <!-- Toast container for save feedback -->
      <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2"></div>

      <!-- Card summary tiles — per-card grid showing used/remaining credits -->
      <section id="card-tiles"></section>

      <!-- Timeline visualization (MVP) -->
      <section id="timeline"></section>

      <!-- FUTURE (not in MVP): Active credits list — checkbox-based list of currently active credits -->
      <!-- <section id="active-credits"></section> -->
    </main>

    <!-- THIS MUST BE type="module" -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
